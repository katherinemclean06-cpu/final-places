    * { box-sizing: border-box; }
    
  body { 
  margin: 0;
  font-family: Arial;
}
    
  a { color: white; }
     
  .header {
  position: relative;
  padding-bottom: 50px;
  padding-top: 15px;
  text-align: center;
  overflow: hidden;
  background-image: url("lobby.jpeg");
  background-size: cover;
}
  .header::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url("lobby.jpeg");
  background-size: cover;
  background-position: 60% 40%;
  filter: brightness(35%); /* ONLY affects image */
  z-index: 0;
}
  .header * {
  position: relative;
  z-index: 1;
}
  .fa {
  padding: 5px;
  font-size: 30px;
  width: 50px;
  text-align: center;
}

  .fa:hover { opacity: 0.7; }

  .fa-instagram {
  color: white;
  position: absolute;
  left: 20px;
}
    
  h1 { 
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 25px;
  color: #6A251A;
  background-color: white;
  font-size: 95px;
  padding: 10px 40px;
  font-family: "Truculenta", Georgia, serif;
  }
  
  h1::before, h1::after {
  content: "★";
  font-size: 40px;
  }
  
  h2 {
  display: flex;
  justify-content: center;
  gap: 20px;
  color: #6A251A;
  background-color: white;
  font-size: 75px;
  margin: 5px;
  font-family: "Truculenta", Georgia, serif;
  }
  
  h2::before, h2::after {
  content: "★";
  font-size: 30px;
  display: flex;
  align-items: center;
  }
  
  nav {
  font-family: "Raleway", sans-serif;
  font-size: 25px;
  width: 725px; 
  margin: auto;
}
  ul{
  list-style-type: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
  }
  
  ul li {
  float: left;
  padding: 10px 25px 15px;
  }
  
  ul li a {
  text-decoration: underline dotted;
  text-underline-offset: 12px;
  text-decoration-thickness: 10px;
  color: white;
  }
  
  nav li a:hover { color: gray; }
    
  .row {
  display: flex;
  flex-wrap: wrap;
  padding: 0 4px;
}
  
  .column {
  flex: 33%;
  max-width: 33%;
  padding: 0 4px;
}
  
  .img-container {
  width: 100%;
  overflow: hidden;
  margin-top: 8px;
}  
  .img-container img {
  width: 100%;
  height: auto; 
  display: block;
  transition: transform 0.5s ease;
}
  .img-container:hover img {
  transform: scale(1.1);
  filter: brightness(80%);
}
    
  .lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
  
  .lightbox:target {
  display: flex;
}
    
  .lightbox img {
  max-width: 90%;
  max-height: 90%;
}
  
  .close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 50px;
  color: white;
  text-decoration: none;
}
    
  @media screen and (max-width: 800px) {
  .column {
  flex: 50%;
  max-width: 50%;
    }
  }
    
  @media screen and (max-width: 600px) {
  .column {
  flex: 100%;
  max-width: 100%;
    }
  }
  
  footer {
  font-size: 20px;
  text-align: center;
  background: #3B3939;
  color: white;
  margin-top: 10px;
  padding: 20px 0 20px;
  }
  </style>
